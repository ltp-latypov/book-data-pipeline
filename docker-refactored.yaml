# Remove version: "3.9" (obsolete)

volumes:
  kestra_postgres_data:
  kestra_data:

networks:
  kestra-spark-network:
    driver: bridge

services:
  # ---------------------------
  # Terraform (IaC)
  # ---------------------------
  terraform:
    image: hashicorp/terraform:1.9.5
    container_name: terraform
    working_dir: /workspace
    networks:
      - kestra-spark-network
    volumes:
      - ./terraform:/workspace
      - ./service-account.json:/workspace/service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/workspace/service-account.json
    depends_on:
      kestra:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: "terraform init && terraform plan -out=tfplan && terraform apply -auto-approve"

  # ---------------------------
  # Spark Master
  # ---------------------------
  spark-master:
    image: apache/spark:4.0.1-java21-r
    container_name: spark-master
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "38080:8080"
      - "37077:7077"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/creds.json
      - SPARK_MASTER_OPTS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/javax.security.auth=ALL-UNNAMED -Djdk.security.allowNonCausingSubstitutions=true
    volumes:
      - ./service-account.json:/gcp/creds.json:ro
      - ./spark_jobs:/opt/spark/work-dir
      - ./data:/data
      - ./gcs-connector-4.0.1-shaded.jar:/opt/spark/jars/gcs-connector.jar:ro
    networks:
      - kestra-spark-network
    restart: unless-stopped

  # ---------------------------
  # Spark Worker
  # ---------------------------
  spark-worker:
    image: apache/spark:4.0.1-java21-r
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/creds.json
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_OPTS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/javax.security.auth=ALL-UNNAMED -Djdk.security.allowNonCausingSubstitutions=true
    volumes:
      - ./service-account.json:/gcp/creds.json:ro
      - ./spark_jobs:/opt/spark/work-dir
      - ./data:/data
      - ./gcs-connector-4.0.1-shaded.jar:/opt/spark/jars/gcs-connector.jar:ro
    networks:
      - kestra-spark-network
    restart: unless-stopped

  # ---------------------------
  # Kestra Postgres
  # ---------------------------
  kestra_postgres:
    image: postgres:18
    container_name: kestra-postgres
    volumes:
      - kestra_postgres_data:/var/lib/postgresql # FIXED: Postgres 18 volume path
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-k3str4}
    networks:
      - kestra-spark-network

  # ---------------------------
  # Kestra Server
  # ---------------------------
  kestra:
    image: kestra/kestra:v1.1
    container_name: kestra
    user: root
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /tmp/kestra-wd:/tmp/kestra-wd
      - /var/run/docker.sock:/var/run/docker.sock
      - ./service-account.json:/gcp/creds.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/creds.json
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${POSTGRES_PASSWORD:-k3str4}
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: "Admin1234!"
          storage:
            type: local
            local:
              basePath: "/app/storage"
          repository:
            type: postgres
          queue:
            type: postgres
    healthcheck: # FIXED: Required so other services can use "condition: service_healthy"
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - kestra-spark-network
    depends_on:
      kestra_postgres:
        condition: service_started

  # ---------------------------
  # Kestra CLI (Flows deploy)
  # ---------------------------
  kestra-cli:
    image: kestra/kestra:v1.1
    container_name: kestra-cli
    volumes:
      - ./flows:/flows
    networks:
      - kestra-spark-network
    command: >
      flow updates
      --server http://kestra:8080
      --user admin@kestra.io:Admin1234!
      /flows
    depends_on:
      kestra:
        condition: service_healthy # FIXED: Wait for server to be fully ready