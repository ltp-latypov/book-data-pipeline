version: 2

models:
  - name: int_books
    description: "Enriched books table."
    tests:
      - dbt_utils.expression_is_true:
          arguments: 
            expression: "years_since_release >= 0 or years_since_release is null"
    columns:
      - name: isbn
        tests:
          - not_null
          - unique
      - name: book_age_category
        tests:
          - accepted_values:
              arguments: 
                values: ['New Release (0-2 yrs)', 'Contemporary (3-10 yrs)', 'Modern (11-30 yrs)', 'Vintage (31-100 yrs)', 'Antique/Classic (>100 yrs)', 'Unknown']

  - name: int_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: age_group
        tests:
          - accepted_values:
              arguments: # ADD THIS LINE
                values: ['Child (0-12)', 'Teen (13-19)', 'Young Adult (20-39)', 'Adult (40-59)', 'Senior (60+)', 'Unknown']

  - name: int_ratings
    description: "Cleaned ratings table."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "book_rating >= 1 and book_rating <= 10"
    columns:
      - name: isbn
        tests:
          - relationships:
              arguments: 
                to: ref('int_books')
                field: isbn
      - name: rating_sentiment
        tests:
          - accepted_values:
              arguments: 
                values: ['Low (1-3)', 'Medium (4-6)', 'High (7-8)', 'Excellent (9-10)']