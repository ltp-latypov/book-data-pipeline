# 20.02.2026
volumes:
  ny_taxi_postgres_data:
    driver: local
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local

networks:
  kestra-spark-network:
    name: kestra-spark-network
    driver: bridge

services:
  terraform:
    image: hashicorp/terraform:1.9.5
    container_name: terraform
    working_dir: /workspace/terraform
    volumes:
      - ./terraform:/workspace/terraform # mount your Terraform configs
      - ./service-account.json:/workspace/service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/workspace/service-account.json
    stdin_open: true
    tty: true
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      kestra:
        condition: service_healthy
    command:
      - |
        terraform init &&
        terraform import google_storage_bucket.books-bucket kestra-books-bucket-latypov || true &&
        terraform import google_bigquery_dataset.demo-dataset books-pipeline-490008:staging_books_data || true &&
        terraform plan -out=tfplan &&
        terraform apply -auto-approve
    networks:
      - kestra-spark-network

  spark-master:
    image: apache/spark:4.0.1-java21-r
    user: "root"
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "38080:8080" # Spark Master UI
      - "37077:7077" # Spark Master RPC
    environment:
      - GCP_KEY_PATH=/opt/spark/conf/gcp-key.json
      - SPARK_MASTER_OPTS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/javax.security.auth=ALL-UNNAMED -Djdk.security.allowNonCausingSubstitutions=true
      - SPARK_DRIVER_JAVA_OPTS=-Djdk.security.allowNonCausingSubstitutions=true
    volumes:
      - ./service-account.json:/opt/spark/conf/gcp-key.json:ro
      #- ./spark_jobs/gcs_spark_transformation.py:/opt/spark/work-dir/gcs_spark_transformation.py
      #- ./pyspark/gcs_spark_users.py:/opt/spark/work-dir/gcs_spark_users.py
      - ./spark_jobs:/opt/spark/work-dir
      #- ./spark_jobs/spark_books.py:/opt/spark/work-dir/spark_books.py
      #- ./pyspark/spark_users.py:/opt/spark/work-dir/spark_users.py
      #- ./pyspark/spark_ratings.py:/opt/spark/work-dir/spark_ratings.py
      - ./data:/workspaces/books-data-pipeline/data # <-- mount data folder
      - ./gcs-connector-4.0.1-shaded.jar:/opt/spark/jars/gcs-connector-4.0.1-shaded.jar:ro
    networks:
      - kestra-spark-network
    restart: unless-stopped

  spark-worker:
    image: apache/spark:4.0.1-java21-r
    user: "root"
    container_name: spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - GCP_KEY_PATH=/opt/spark/conf/gcp-key.json
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_OPTS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/javax.security.auth=ALL-UNNAMED -Djdk.security.allowNonCausingSubstitutions=true
      - SPARK_EXECUTOR_JAVA_OPTS=-Djdk.security.allowNonCausingSubstitutions=true
    volumes:
      - ./service-account.json:/opt/spark/conf/gcp-key.json:ro
      - ./spark_jobs:/opt/spark/work-dir
      - ./data:/workspaces/books-data-pipeline/data # <-- mount data folder here too
      - ./gcs-connector-4.0.1-shaded.jar:/opt/spark/jars/gcs-connector-4.0.1-shaded.jar:ro
    networks:
      - kestra-spark-network
    restart: unless-stopped

  kestra_postgres:
    image: postgres:18
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    networks:
      - kestra-spark-network

  kestra:
    image: kestra/kestra:v1.1
    user: "root"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ~/.gcp/workflow-orchestration-credentials.json:/.gcp/credentials.json
    env_file: .env_encoded
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: Admin1234!
          storage:
            type: local
            local:
              basePath: "/app/storage"
          repository:
            type: postgres
          queue:
            type: postgres
          tasks:
            scripts:
              docker:
                volumes:
                  enabled: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - kestra-spark-network
    depends_on:
      kestra_postgres:
        condition: service_started

  kestra-cli:
    image: kestra/kestra:v1.1
    container_name: kestra-cli
    volumes:
      - ./flows:/flows
    networks:
      - kestra-spark-network
    command:
      - flow
      - updates
      - --server
      - http://kestra:8080
      - --user
      - "admin@kestra.io:Admin1234!"
      - /flows
    depends_on:
      kestra:
        condition: service_healthy