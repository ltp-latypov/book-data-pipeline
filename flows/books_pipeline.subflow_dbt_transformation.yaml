id: subflow_dbt_transformation
namespace: books_pipeline

tasks:
  - id: working_dir
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repo
        type: io.kestra.plugin.git.Clone
        url: https://github.com/ltp-latypov/book-data-pipeline
        branch: main

      - id: dbt_build
        type: io.kestra.plugin.dbt.cli.DbtCLI
        # env: block is REMOVED because we use target.project now
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        projectDir: dbt_books
        inputFiles:
          sa.json: "{{ kv('GCP_CREDS') }}"
        commands:
          - dbt deps
          - dbt build
        profiles: |
          dbt_books:
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: "{{ kv('GCP_PROJECT_ID') }}"
                dataset: "{{ kv('GCP_DATASET_ANALYTICS') }}"
                location: "{{ kv('GCP_LOCATION') }}"
                threads: 16
                keyfile: sa.json
                priority: interactive
            target: dev


